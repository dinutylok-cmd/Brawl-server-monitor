name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # Используем официальный метод сборки
        uses: Nickisnotghost/buildozer-action@v1
        with:
          python-version: 3.11
          buildozer-version: stable
          command: buildozer android debug
          repository_root: .

      - name: Upload APK
        # Используем v4, так как v3 теперь запрещена (как раз твоя ошибка)
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
